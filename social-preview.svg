<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="600" y1="0" x2="600" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17374B"/>
      <stop offset="1" stop-color="#07111A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 62) rotate(49.7636) scale(495.099 755.456)">
      <stop stop-color="#6CABDD" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#6CABDD" stop-opacity="0"/>
